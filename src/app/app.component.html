<aside class="sidebar">
  <nav>
    <ul>
      @for(route of routes; track $index){
      <li>
        <a
          [routerLink]="route.routerLink"
          routerLinkActive="active"
          ariaCurrentWhenActive="page"
          >{{ route.label }}</a
        >
      </li>
      }
    </ul>
  </nav>
</aside>
<main>
  <router-outlet />
</main>
